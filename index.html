<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tetris - Robust Static Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <h1>Tetris</h1>
    <p>A robust, classic Tetris-inspired game built as a static GitHub Pages app.</p>
  </header>
  <main class="container">
    <section class="game-area">
      <canvas id="game" width="240" height="480" aria-label="Tetris game canvas"></canvas>
    </section>
    <section class="sidebar" aria-label="Game info and controls">
      <canvas id="next" width="96" height="96" aria-label="Next tetromino preview"></canvas>
      <div class="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Level: <span id="level">1</span></div>
        <div>Lines: <span id="lines">0</span></div>
      </div>
      <div class="controls">
        <button id="startBtn" title="Start game">Start</button>
        <button id="pauseBtn" disabled title="Pause game">Pause</button>
      </div>
      <p class="hint">Controls: Left/Right to move • Up to rotate • Down to soft drop • Space for hard drop</p>
      <p class="contact">Contact: student@example.com</p>
    </section>
  </main>
  <footer class="footer"><small>Static GitHub Pages app • MIT licensed</small></footer>
  <script src="script.js" defer></script>
</body>
</html>
