<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-container" aria-label="Tetris game container">
    <header class="header">
      <h1>Tetris</h1>
      <p class="subtitle">A simple Tetris clone for GitHub Pages (vanilla JS)</p>
    </header>

    <main class="game-area" role="main">
      <canvas id="board" width="240" height="480" aria-label="Game board"></canvas>
      <aside class="side-panel">
        <div class="panel stat-panel" aria-label="Score, Lines, Level">
          <div>Score<br><span id="score">0</span></div>
          <div>Lines<br><span id="lines">0</span></div>
          <div>Level<br><span id="level">1</span></div>
        </div>
        <div class="panel next-panel" aria-label="Next piece preview">
          <div class="next-title">Next</div>
          <canvas id="next" width="80" height="80" aria-label="Next piece preview"></canvas>
        </div>
        <button id="restartBtn" class="btn" title="Restart (R)">Restart</button>
      </aside>
    </main>

    <div id="overlay" class="overlay" hidden>
      <div class="overlay-content">
        <h2>Game Over</h2>
        <p>Your score: <span id="overlayScore">0</span></p>
        <button id="overlayRestart" class="btn">Restart</button>
      </div>
    </div>

    <footer class="hint">Controls: Arrow keys to move/rotate, Space hard drop, P pause, R restart</footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
